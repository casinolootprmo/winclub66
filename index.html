<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIN CLUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0c0a0a;
            /* Casino Background Image Layout - Updated with Purple Overlay */
            background-image: linear-gradient(180deg, rgba(26, 11, 35, 0.88) 0%, rgba(12, 10, 15, 0.97) 100%), 
                              url('https://images.unsplash.com/photo-1606167668584-78701c57f13d?q=80&w=600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        /* Screen Wrapper mimicking Mobile phone view */
        .phone-wrapper {
            width: 100%;
            max-width: 410px;
            min-height: 100vh;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header Navigation */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            margin-top: 10px;
        }

        .back-btn {
            font-size: 22px;
            color: #f5f5f5;
            cursor: pointer;
            font-weight: 300;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .support-icon {
            width: 22px;
            height: 22px;
            opacity: 0.8;
            cursor: pointer;
        }

        .lang-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #f5f5f5;
        }

        .lang-flag {
            width: 20px;
            height: 14px;
            object-fit: cover;
            border-radius: 2px;
        }

        /* Logo Box */
        .logo-box {
            text-align: center;
            margin-bottom: 45px;
        }

        .logo-box img {
            max-width: 200px;
            height: auto;
        }

        /* Form Layout */
        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            background-color: rgba(31, 26, 36, 0.85);
            border: 1px solid #4a3554;
            border-radius: 12px;
            padding: 16px 45px 16px 65px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-group input::placeholder {
            color: #7b6b85;
        }

        .input-group input:focus {
            border-color: #a855f7;
            background-color: rgba(46, 36, 55, 0.95);
        }

        /* Absolute Inner Icons & Codes */
        .input-group .country-prefix {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #ffffff;
            font-size: 15px;
            font-weight: 500;
        }

        .input-group .icon-left {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            opacity: 0.6;
        }

        .input-group .icon-right-eye {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            opacity: 0.4;
            cursor: pointer;
        }

        .input-group .password-field {
            padding-left: 50px;
        }

        /* Extra elements underneath fields */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-top: 5px;
            margin-bottom: 40px;
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a58e99;
            cursor: pointer;
            user-select: none;
        }

        .remember-checkbox input {
            width: 16px;
            height: 16px;
            accent-color: #a855f7;
            background: #241f29;
            border: 1px solid #4a3554;
            border-radius: 4px;
        }

        .forgot-link {
            color: #d8b4fe;
            text-decoration: none;
            font-weight: 500;
        }

        .bonus-badge-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .bonus-badge {
            background: linear-gradient(90deg, #c084fc 0%, #9333ea 100%);
            color: #ffffff;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 8px rgba(147, 51, 234, 0.3);
        }

        /* Premium Actions Buttons */
        .action-btn {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
            text-align: center;
            margin-bottom: 16px;
            border: none;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .btn-red {
            background: linear-gradient(180deg, #a855f7 0%, #7e22ce 100%);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(126, 34, 206, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: #d8b4fe;
            border: 1px solid rgba(168, 85, 247, 0.6);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="header-nav">
            <span class="back-btn" onclick="goToLogin()">&#10094;</span>
            <div class="header-right">
                <svg class="support-icon" viewBox="0 0 24 24" fill="none" stroke="#f5f5f5" stroke-width="2">
                    <path d="M3 14c0-4.97 4.03-9 9-9s9 4.03 9 9M21 14v2a3 3 0 0 1-3 3h-1M3 14v2a3 3 0 0 0 3 3h1" />
                    <rect x="6" y="12" width="4" height="6" rx="1" fill="#fff"/>
                    <rect x="14" y="12" width="4" height="6" rx="1" fill="#fff"/>
                </svg>
                <div class="lang-selector">
                    <img class="lang-flag" src="https://flagcdn.com/w20/gb.png" alt="EN">
                    <span>EN</span>
                </div>
            </div>
        </div>

        <div class="logo-box">
            <img src="https://github.com/casinolootprmo/glowing-waffle/blob/538a3b54242282d2b43a393fdbfe9824bd9a9bb6/file_0000000061b071faa07ae0a17acb5b28.png?raw=true" alt="Logo">
        </div>

        <div id="login-section">
            <form onsubmit="handleAuth(event);">
                <div class="input-group">
                    <span class="country-prefix">+91</span>
                    <input type="tel" style="padding-left: 65px;" placeholder="Enter your phone number" required>
                </div>

                <div class="input-group">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="#d8b4fe" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" class="password-field" id="log-pass" placeholder="Please enter the password" required>
                    <svg class="icon-right-eye" onclick="toggleView('log-pass')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>

                <div class="options-row">
                    <label class="remember-checkbox">
                        <input type="checkbox"> Remember password
                    </label>
                    <a href="#" class="forgot-link">Forgot Password</a>
                </div>

                <button type="submit" class="action-btn btn-red">Login</button>
                <button type="button" class="action-btn btn-outline" onclick="toggleScreen('register')">Register Now</button>
            </form>
        </div>

        <div id="register-section" class="hidden">
            <form onsubmit="handleAuth(event);">
                <div class="input-group">
                    <span class="country-prefix">+91</span>
                    <input type="tel" style="padding-left: 65px;" placeholder="Enter your phone number" required>
                </div>

                <div class="input-group">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="#d8b4fe" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" class="password-field" id="reg-pass-1" placeholder="Password:8-15 letters and numbers" required>
                    <svg class="icon-right-eye" onclick="toggleView('reg-pass-1')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>

                <div class="input-group">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="#d8b4fe" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" class="password-field" id="reg-pass-2" placeholder="Enter the password again" required>
                    <svg class="icon-right-eye" onclick="toggleView('reg-pass-2')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>

                <div class="input-group">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="#d8b4fe" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    <input type="text" class="password-field" value="67BGHUN" readonly style="color: #ecd1ff; font-weight: bold; letter-spacing: 0.5px;">
                </div>

                <div class="bonus-badge-container">
                    <span class="bonus-badge">🪙 +100-999</span>
                </div>

                <button type="submit" class="action-btn btn-red" style="margin-top: 5px;">Register</button>
                <button type="button" class="action-btn btn-outline" onclick="toggleScreen('login')">Password Login</button>
            </form>
        </div>
    </div>

    <script>
        function handleAuth(event) {
            event.preventDefault(); 
            window.location.href = "dashboard.html";
        }

        function toggleScreen(target) {
            const loginSec = document.getElementById('login-section');
            const registerSec = document.getElementById('register-section');

            if(target === 'register') {
                loginSec.classList.add('hidden');
                registerSec.classList.remove('hidden');
            } else {
                registerSec.classList.add('hidden');
                loginSec.classList.remove('hidden');
            }
        }

        function goToLogin() {
            toggleScreen('login');
        }

        function toggleView(id) {
            const field = document.getElementById(id);
            if(field.type === "password") {
                field.type = "text";
            } else {
                field.type = "password";
            }
        }
    </script>
</body>
                      </html>
